<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Alice | Gestão</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="bg-slate-50 text-slate-800">

    <div id="loginBlock" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-xl w-full max-w-sm border border-slate-100">
            <h2 class="text-2xl font-bold text-center mb-6 text-pink-600">Niver Alice 🎂</h2>
            <input type="text" id="adminUser" placeholder="Usuário" class="w-full p-4 mb-3 border rounded-xl bg-slate-50">
            <input type="password" id="adminPassword" placeholder="Senha" class="w-full p-4 mb-6 border rounded-xl bg-slate-50">
            <button onclick="verifyAccess()" class="w-full py-4 bg-gradient-to-r from-pink-500 to-violet-600 text-white rounded-xl font-bold shadow-lg">Entrar</button>
            <p id="loginError" class="text-red-500 text-center mt-4 text-sm hidden">Credenciais inválidas!</p>
        </div>
    </div>

    <div id="adminDashboard" class="hidden min-h-screen p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Monitoramento</h1>
            <button onclick="logout()" class="px-4 py-2 bg-slate-800 text-white rounded-lg text-sm">Sair</button>
        </header>

        <div class="grid grid-cols-3 gap-4 mb-8">
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-xs text-gray-400">Adultos</p><h3 id="totalAdults" class="text-xl font-bold">0</h3></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center"><p class="text-xs text-gray-400">Crianças</p><h3 id="totalChildren" class="text-xl font-bold">0</h3></div>
            <div class="bg-white p-4 rounded-2xl shadow-sm border text-center border-pink-200"><p class="text-xs text-gray-400">Total</p><h3 id="totalGeneral" class="text-xl font-bold">0</h3></div>
        </div>

        <div class="bg-white rounded-3xl shadow-sm border overflow-hidden">
            <table class="w-full text-sm text-left">
                <thead class="bg-slate-50 text-slate-500">
                    <tr><th class="p-4">Nome</th><th class="p-4">Adultos</th><th class="p-4">Crianças</th></tr>
                </thead>
                <tbody id="guestsTableBody" class="divide-y"></tbody>
            </table>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
