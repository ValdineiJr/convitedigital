<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Portal de Gestão | Controle de Presença</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/dist/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Garante a integridade visual estrutural de todos os elementos */
        *, *::before, *::after {
            box-sizing: border-box;
        }

        body { 
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(135deg, #fce7f3 0%, #e0e7ff 100%);
            color: #334155;
            min-height: 100vh;
            margin: 0;
        }
        
        /* Regra forçada para garantir que elementos ocultos não apareçam */
        .d-none {
            display: none !important;
        }
        
        /* ==========================================
           MÓDULO DE AUTENTICAÇÃO (LOGIN)
           ========================================== */
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.6);
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
        }

        .input-custom {
            height: 60px;
            border-radius: 16px;
            border: 2px solid #e2e8f0;
            padding: 10px 20px;
            font-size: 1.15rem;
            width: 100%; /* Agora respeita o limite do box-sizing */
            background-color: #f8fafc;
            color: #334155;
            transition: all 0.3s;
            margin-top: 8px;
        }

        .input-custom:focus {
            border-color: #ec4899;
            outline: none;
            box-shadow: 0 0 0 4px rgba(236, 72, 153, 0.15);
            background-color: #ffffff;
        }

        .btn-auth {
            background: linear-gradient(135deg, #ec4899, #8b5cf6);
            color: white;
            height: 60px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 1.2rem;
            border: none;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(236, 72, 153, 0.3);
            transition: transform 0.2s;
            margin-top: 15px;
        }
        
        .btn-auth:active {
            transform: scale(0.96);
        }

        /* ==========================================
           PAINEL DE GERENCIAMENTO (DASHBOARD)
           ========================================== */
        .dashboard-header { 
            background: linear-gradient(135deg, #1e293b, #0f172a); 
            color: white; 
            padding: 25px 20px; 
            border-radius: 0 0 20px 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .stat-card { border: none; border-radius: 16px; box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        .table-container { background: white; border-radius: 16px; padding: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.04); }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .spin-anim { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div id="loginBlock" class="login-wrapper">
        <div class="glass-panel">
            <div class="text-center mb-4">
                <h2 class="fw-bold mb-1" style="color: #db2777;">Niver do [Nome] 🎂</h2>
                <p class="text-muted small fw-bold">Portal de Gestão de Convidados</p>
            </div>

            <div class="mb-4 text-start">
                <label class="fw-bold text-secondary" style="font-size: 0.95rem;">Usuário</label>
                <input type="text" id="adminUser" class="input-custom" placeholder="Ex: admin">
            </div>
            
            <div class="mb-4 text-start">
                <label class="fw-bold text-secondary" style="font-size: 0.95rem;">Senha de Acesso</label>
                <input type="password" id="adminPassword" class="input-custom" placeholder="••••••••">
            </div>
            
            <button onclick="verifyAccess()" class="btn-auth">
                Acessar Painel
            </button>
            
            <div id="loginError" class="alert alert-danger mt-4 d-none text-center small py-2 rounded-3 border-0 fw-bold">
                Falha de integridade: Credenciais inválidas.
            </div>
        </div>
    </div>

    <!-- Dashboard Moderno -->
<div id="adminDashboard" class="d-none">    <!-- Cabeçalho -->
    <div class="dashboard-header mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <div>
                <h3 class="fw-bold m-0 text-white">Dashboard do Evento</h3>
                <small class="text-white-50">Monitoramento em tempo real</small>
            </div>
            <button onclick="logout()" class="btn btn-outline-light btn-sm">Sair</button>
        </div>
    </div>

    <div class="container">
        <!-- Cards de Métricas (Melhor visibilidade) -->
        <div class="row g-3 mb-4">
            <div class="col-4">
                <div class="card p-3 shadow-sm text-center border-0">
                    <small class="text-muted d-block">Adultos</small>
                    <h4 class="fw-bold text-primary mb-0" id="totalAdults">0</h4>
                </div>
            </div>
            <div class="col-4">
                <div class="card p-3 shadow-sm text-center border-0">
                    <small class="text-muted d-block">Crianças</small>
                    <h4 class="fw-bold text-success mb-0" id="totalChildren">0</h4>
                </div>
            </div>
            <div class="col-4">
                <div class="card p-3 shadow-sm text-center border-0 bg-dark text-white">
                    <small class="text-light d-block opacity-75">Total</small>
                    <h4 class="fw-bold mb-0" id="totalGeneral">0</h4>
                </div>
            </div>
        </div>

        <!-- Lista de Confirmações Estilizada -->
        <div class="card shadow-sm border-0 p-3">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h5 class="fw-bold m-0">Lista de Convidados</h5>
                <button class="btn btn-sm btn-outline-primary" onclick="forceSync()">
    <span id="syncIcon">🔄</span> Atualizar
</button>
            </div>
            
            <div class="table-responsive">
                <table class="table align-middle">
                    <thead class="table-light">
                        <tr>
                            <th>Responsável</th>
                            <th class="text-center">Adultos</th>
                            <th class="text-center">Crianças</th>
                            <th>Data</th>
                        </tr>
                    </thead>
                    <tbody id="guestsTableBody">
                        <!-- Conteúdo carregado via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
    <script>
        // Ao carregar a página, verifica se já existe uma sessão gravada
        window.onload = function() {
            if (localStorage.getItem('isLoggedIn') === 'true') {
                document.getElementById('loginBlock').classList.add('d-none');
                document.getElementById('adminDashboard').classList.remove('d-none');
                loadDashboardData();
            }
        };

        function forceSync() {
            const icon = document.getElementById('syncIcon');
            icon.classList.add('spin-anim');
            setTimeout(() => { icon.classList.remove('spin-anim'); }, 800);
        }
    </script>

    
</body>
</html>
